version:
  min_required_version: 3.3.3
  current_version: 3.4.4
  latest_program_version: 3.4.1
  update_url: https://github.com/Moonholder/Wuwa_Mod_Fixer/releases/latest
  support_url_cn: https://support.jix.de5.net
  support_url_intl: https://ko-fi.com/moonholder
lang:
  version_mismatch:
    zh: '当前版本 {current_version} < 要求的最低版本 {min_required_version}，请下载最新版本: {update_url}'
    en: >-
      Current version {current_version} < required minimum version {min_required_version}, please download the latest
      version: {update_url}
  current_version:
    zh: '当前配置版本: {version}'
    en: 'Current config version: {version}'
  version_check_passed:
    zh: |
      ✅ 版本检查通过: {msg}
    en: |
      ✅ Version check passed: {msg}
  version_check_failed:
    zh: |
      ❌ 版本检查失败: {error}
    en: |
      ❌ Version check failed: {error}
  title:
    zh: |
      此修复工具适用于WWMI生产的Mod因游戏版本更新导致失效的情况
    en: >
      This fix tool is applicable when the mods produced by WWMI become ineffective due to the update of the game
      version.
  intro:
    zh: |+
      修复3.4: 请将XXMI更新至最新版本
      * 修复漂泊者
      * 修复布兰特的贴图错误
      * 修复秋水并添加可应用稳定纹理
      * 修复洛瑟菈NPC/角色界面
      * 更新UID的哈希值
      * 添加了露西和丽贝卡的画面细节中/高的贴图hash

    en: |+
      Fix 3.4: Please update XXMI to the latest version.
      * Fix Rover
      * Fix Brant's texture error
      * Fix Aalto and add stable textures
      * Fix Lucilla NPC/Character Interface
      * Updated UID Hashes
      * Added Lucy and Rebecca's LOD Bias Medium/High texture hashes

  intro_note:
    zh: 确保光追已关闭。若 Engine.ini 中存在 r.RayTracing.LoadConfig，必须将其设为 0，否则面部会出错
    en: >-
      Disable Ray Tracing. Ensure r.RayTracing.LoadConfig is set to 0 in Engine.ini (if present), or the face will
      break.
  compatibility_note:
    zh: >-

      注：wwmi 0.6x版本的旧Mod在WWMI 070版本之后需开启兼容模式才能加载. 开启后有一定性能损失. 开启方式: 游戏内 Alt + F12. 显示 Compatibility Mode:
      Enabled
    en: >-

      Note: The old mods of the WWMI 0.6x version need to have the compatibility mode enabled to be loaded after the
      WWMI 070 version. Enabling it will result in a certain performance loss. The way to enable it is: press Alt + F12
      in the game. It should display 'Compatibility Mode: Enabled'.
  graphics_setting_note:
    zh: 游戏从2.0版本开始不同画面预设的Hash值可能不同，这可能导致Mod贴图错误，请将图形质量预设调整至均衡/画质优先
    en: >-
      Starting from version 2.0, different graphics presets may have different hash values, which may cause mod texture
      errors. Please set the graphics quality preset to Balanced/Quality.
  found_old_mod:
    zh: 发现旧版Mod(wwmi 0.6x)，正在尝试修复...
    en: Found old mod (wwmi 0.6x), trying to fix...
  match_character_prompt:
    zh: 匹配到对象 {character}，正在处理...
    en: Matching Objects {character}, processing...
  backup_created:
    zh: '创建备份: {backup_path}'
    en: 'Backup created: {backup_path}'
  backup_failed:
    zh: '创建备份失败: {file_path}'
    en: 'Backup creation failed: {file_path}'
  process_file_start:
    zh: 正在处理文件 {file_path}
    en: Processing file {file_path}
  process_file_done:
    zh: 已完成对文件 {file_path} 的处理
    en: Processing of file {file_path} done
  remapped_successfully:
    zh: 顶点组重映射...
    en: Vertex group remapping...
  no_need_fix:
    zh: 未匹配到修复，跳过备份与处理
    en: No need to fix, skip backup and processing
  process_file_error:
    zh: '处理文件 {file_path} 时出现异常: {exception}'
    en: 'Exception occurred while processing file {file_path}: {exception}'
  process_folder_done:
    zh: 共处理了 {success_count} 个文件，跳过 {failure_count} 个文件
    en: processed {success_count} files, skipped {failure_count} files
  input_folder_prompt:
    zh: '请输入包含Mod文件的文件夹路径（直接回车则从当前目录开始）:'
    en: 'Please enter the folder path containing mod files (press Enter to use current directory):'
  start_processing:
    zh: 开始处理文件夹 {mod_folder_path} 下的Mod ini文件
    en: Start processing mod ini files in folder {mod_folder_path}
  all_done:
    zh: 所有文件处理完成...
    en: All files processed...
  error_occurred:
    zh: '程序出现异常: {error}'
    en: 'An error occurred: {error}'
  error_prompt:
    zh: 程序出现异常，请查看上述错误信息...
    en: An error occurred. Please check the error message above...
  aero_rover_female_eyes_fixed:
    zh: 女漂-风主形态满共鸣能量时眼睛已修复
    en: Female aero-rover eyes fixed when it has full charge
  path_not_a_directory:
    zh: 路径 {path} 不是一个有效的目录
    en: Path {path} is not a valid directory
  permission_check_remove_failed:
    zh: '无法删除临时权限检查文件 {path}，请手动删除。错误: {error}'
    en: 'Failed to remove temporary permission check file {path}, please remove it manually. Error: {error}'
  permission_check_create_failed:
    zh: '在 {path} 创建文件失败，请检查写权限。错误: {error}'
    en: 'Failed to create file in {path}, please check write permissions. Error: {error}'
  admin_prompt_suggestion:
    zh: 建议以管理员身份重新运行此程序以获取足够的权限。
    en: It is recommended to re-run this program as an administrator to get sufficient permissions.
  traversal_error:
    zh: '遍历目录时出错: {path}, 错误: {error}'
    en: 'Error traversing directory: {path}, Error: {error}'
